name: Release installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.5.0)'
        required: true
        default: 'v1.5.0'

jobs:
  # ─────────────────────────── Windows build ───────────────────────────
  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m venv backend\.venv
          backend\.venv\Scripts\python.exe -m pip install --upgrade pip wheel
          backend\.venv\Scripts\python.exe -m pip install ./backend
          backend\.venv\Scripts\python.exe -m pip install pyinstaller==6.11.1 pillow

      - name: Sync version from tag
        shell: pwsh
        run: |
          $tag = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } elseif ("${{ github.event.inputs.version }}") { "${{ github.event.inputs.version }}" } else { "" }
          if ($tag) {
            $ver = $tag -replace '^v', ''
            backend\.venv\Scripts\python.exe scripts/bump_version.py $ver
          }

      - name: Install Node deps
        run: npm ci
        working-directory: frontend

      - name: Build installer
        run: python installer/build.py --clean --installer

      - name: Rename artifacts
        shell: pwsh
        run: |
          $ver = (Select-String -Path backend/pyproject.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          if (Test-Path "dist-installer/Telegrab-$ver-Setup.exe") {
            Rename-Item "dist-installer/Telegrab-$ver-Setup.exe" "telegrab-windows-setup.exe"
          }
          if (Test-Path "dist-installer/telegrab.exe") {
            Rename-Item "dist-installer/telegrab.exe" "telegrab-windows-portable.exe"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegrab-windows
          path: |
            dist-installer/telegrab-windows-setup.exe
            dist-installer/telegrab-windows-portable.exe
          retention-days: 30

  # ──────────────────────────── macOS build ────────────────────────────
  macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip wheel
          backend/.venv/bin/python -m pip install ./backend
          backend/.venv/bin/python -m pip install pyinstaller==6.11.1 pillow

      - name: Sync version from tag
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version || '' }}"
          if [ -n "$TAG" ]; then
            VER="${TAG#v}"
            backend/.venv/bin/python scripts/bump_version.py "$VER"
          fi

      - name: Install Node deps
        run: npm ci
        working-directory: frontend

      - name: Build installer
        run: python installer/build.py --clean

      - name: Package .zip
        run: |
          cd dist-installer
          if [ -d "telegrab.app" ]; then
            zip -r telegrab-macos.zip telegrab.app
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegrab-macos
          path: dist-installer/telegrab-macos.zip
          retention-days: 30
          if-no-files-found: warn

  # ──────────────────────────── Linux build ────────────────────────────
  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev libcairo2-dev libwebkit2gtk-4.1-dev

      - name: Install Python deps
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip wheel
          backend/.venv/bin/python -m pip install ./backend
          backend/.venv/bin/python -m pip install pyinstaller==6.11.1 pillow

      - name: Sync version from tag
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version || '' }}"
          if [ -n "$TAG" ]; then
            VER="${TAG#v}"
            backend/.venv/bin/python scripts/bump_version.py "$VER"
          fi

      - name: Install Node deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build with PyInstaller
        run: |
          backend/.venv/bin/python -m PyInstaller \
            --name telegrab \
            --onefile \
            --add-data "frontend/dist:frontend/dist" \
            --add-data "assets/icons/app.svg:assets/icons" \
            --hidden-import telegrab \
            --hidden-import telegrab.app \
            backend/telegrab/__main__.py

      - name: Rename and package
        run: |
          mv dist/telegrab dist/telegrab-linux
          chmod +x dist/telegrab-linux
          tar -czf dist/telegrab-linux.tar.gz -C dist telegrab-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegrab-linux
          path: dist/telegrab-linux.tar.gz
          retention-days: 30

  # ─────────────────────── Publish GitHub Release ───────────────────────
  release:
    name: Publish Release
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 -oP '(?<=^version = ")[^"]+' backend/pyproject.toml)
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=Telegrab v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.ref_type == 'tag' && github.ref_name || steps.version.outputs.tag }}"
          name: "${{ github.ref_type == 'tag' && github.ref_name || steps.version.outputs.name }}"
          draft: false
          generate_release_notes: true
          files: |
            artifacts/telegrab-windows/telegrab-windows-setup.exe
            artifacts/telegrab-windows/telegrab-windows-portable.exe
            artifacts/telegrab-macos/telegrab-macos.zip
            artifacts/telegrab-linux/telegrab-linux.tar.gz
