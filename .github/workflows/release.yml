name: Release installers

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.4.0)'
        required: true
        default: 'v1.4.0'

jobs:
  # ─────────────────────────── Windows build ───────────────────────────
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m venv backend\.venv
          backend\.venv\Scripts\python.exe -m pip install --upgrade pip wheel
          backend\.venv\Scripts\python.exe -m pip install -r backend\requirements.txt
          backend\.venv\Scripts\python.exe -m pip install pyinstaller==6.11.1 pillow

      - name: Install Node deps
        run: npm ci
        working-directory: frontend

      - name: Build installer
        run: python installer/build.py --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramDrive-windows-x64
          path: dist-installer/TelegramDrive.exe
          retention-days: 30

  # ──────────────────────────── macOS build ────────────────────────────
  macos:
    name: macOS installer
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip wheel
          backend/.venv/bin/python -m pip install -r backend/requirements.txt
          backend/.venv/bin/python -m pip install pyinstaller==6.11.1 pillow

      - name: Install Node deps
        run: npm ci
        working-directory: frontend

      - name: Build installer
        run: python installer/build.py --clean

      - name: Build .dmg
        run: |
          # Use create-dmg if available, otherwise fall back to a plain zip
          # of the .app bundle.
          if command -v create-dmg >/dev/null 2>&1; then
            create-dmg \
              --volname "Telegram Drive" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "TelegramDrive.app" 175 190 \
              --hide-extension "TelegramDrive.app" \
              --app-drop-link 425 190 \
              "dist-installer/TelegramDrive.dmg" \
              "dist-installer/TelegramDrive.app"
          else
            cd dist-installer && zip -r TelegramDrive-macos.zip TelegramDrive.app
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramDrive-macos
          path: |
            dist-installer/TelegramDrive.dmg
            dist-installer/TelegramDrive-macos.zip
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────── Aggregate into a release ───────────────────────
  release:
    name: Publish GitHub Release
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TelegramDrive-windows-x64
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: TelegramDrive-macos
          path: artifacts/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}"
          name: "${{ github.ref_type == 'tag' && github.ref_name || format('Auto-Build {0}', github.run_number) }}"
          draft: false
          generate_release_notes: true
          files: |
            artifacts/windows/TelegramDrive.exe
            artifacts/macos/TelegramDrive.dmg
            artifacts/macos/TelegramDrive-macos.zip
