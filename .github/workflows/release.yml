name: Release installers

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.4.0)'
        required: true
        default: 'v1.4.0'

jobs:
  # ─────────────────────────── Windows build ───────────────────────────
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - name: Install uv
        run: powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"
        shell: bash

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m venv backend\.venv
          backend\.venv\Scripts\python.exe -m pip install --upgrade pip wheel
          backend\.venv\Scripts\python.exe -m pip install ./backend
          backend\.venv\Scripts\python.exe -m pip install pyinstaller==6.11.1 pillow

      - name: Sync version from tag
        shell: pwsh
        run: |
          $tag = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } elseif ("${{ github.event.inputs.version }}") { "${{ github.event.inputs.version }}" } else { "" }
          if ($tag) {
            $ver = $tag -replace '^v', ''
            backend\.venv\Scripts\python.exe scripts/bump_version.py $ver
          }

      - name: Install Node deps
        run: npm ci
        working-directory: frontend

      - name: Build installer
        run: python installer/build.py --clean --installer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegrab-windows-x64
          path: |
            dist-installer/Telegrab-*-Setup.exe
            dist-installer/telegrab.exe
          retention-days: 30

  # ──────────────────────────── macOS build ────────────────────────────
  macos:
    name: macOS installer
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        shell: bash

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip wheel
          backend/.venv/bin/python -m pip install ./backend
          backend/.venv/bin/python -m pip install pyinstaller==6.11.1 pillow

      - name: Sync version from tag
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version || '' }}"
          if [ -n "$TAG" ]; then
            VER="${TAG#v}"
            backend/.venv/bin/python scripts/bump_version.py "$VER"
          fi

      - name: Install Node deps
        run: npm ci
        working-directory: frontend

      - name: Build installer
        run: python installer/build.py --clean

      - name: Build .dmg
        run: |
          # Use create-dmg if available, otherwise fall back to a plain zip
          # of the .app bundle.
          if command -v create-dmg >/dev/null 2>&1; then
            create-dmg \
              --volname "telegrab" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "telegrab.app" 175 190 \
              --hide-extension "telegrab.app" \
              --app-drop-link 425 190 \
              "dist-installer/telegrab.dmg" \
              "dist-installer/telegrab.app"
          else
            cd dist-installer && zip -r telegrab-macos.zip telegrab.app
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegrab-macos
          path: |
            dist-installer/telegrab.dmg
            dist-installer/telegrab-macos.zip
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────── Aggregate into a release ───────────────────────
  release:
    name: Publish GitHub Release
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: telegrab-windows-x64
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: telegrab-macos
          path: artifacts/macos

      - name: Get version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -m1 -oP '(?<=^version = ")[^"]+' backend/pyproject.toml)
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=Telegrab v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.ref_type == 'tag' && github.ref_name || steps.version.outputs.tag }}"
          name: "${{ github.ref_type == 'tag' && github.ref_name || steps.version.outputs.name }}"
          draft: false
          generate_release_notes: true
          files: |
            artifacts/windows/Telegrab-*-Setup.exe
            artifacts/windows/telegrab.exe
            artifacts/macos/telegrab.dmg
            artifacts/macos/telegrab-macos.zip
